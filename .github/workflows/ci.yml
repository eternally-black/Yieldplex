name: ci

on:
  push:
    branches: [master, main]
  pull_request:
  workflow_dispatch:

jobs:
  # Always-on gate (no secrets): typecheck + the offline single-decoder unit tests. This is what the
  # README badge tracks — green on every push, including forks without secrets.
  checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install deps
        run: npm ci || npm install
      - name: TypeScript typecheck
        run: npx tsc --noEmit -p tsconfig.json
      - name: SDK single-decoder unit tests (offline, no validator)
        run: npx ts-mocha -p ./tsconfig.json -t 1000000 tests/sdk/decode.spec.ts

  # Mainnet-fork suite. Gated on two repo secrets (so forks don't fail):
  #   MAINNET_RPC_URL  — an RPC the fork clones live protocol state from.
  #   PROGRAM_KEYS_B64 — base64 of `tar czf - keys` (the declared program keypairs; keys/ is gitignored,
  #                      and the fork test must deploy with ids that match declare_id!).
  # The committed tests/fork/fork-run.log is the canonical pre-run proof; this job re-verifies it.
  mainnet-fork:
    runs-on: ubuntu-latest
    needs: checks
    env:
      MAINNET_RPC_URL: ${{ secrets.MAINNET_RPC_URL }}
      PROGRAM_KEYS_B64: ${{ secrets.PROGRAM_KEYS_B64 }}
    steps:
      - uses: actions/checkout@v4
      - name: Gate on secrets
        id: gate
        run: |
          if [ -z "$MAINNET_RPC_URL" ] || [ -z "$PROGRAM_KEYS_B64" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::MAINNET_RPC_URL / PROGRAM_KEYS_B64 not set — skipping mainnet-fork suite (see README)."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi
      - uses: actions/setup-node@v4
        if: steps.gate.outputs.run == 'true'
        with:
          node-version: "20"
          cache: npm
      - name: Install Solana 3.1.10
        if: steps.gate.outputs.run == 'true'
        run: |
          sh -c "$(curl -sSfL https://release.anza.xyz/v3.1.10/install)"
          echo "$HOME/.local/share/solana/install/active_release/bin" >> "$GITHUB_PATH"
      - name: Install Anchor 1.0.2 (avm)
        if: steps.gate.outputs.run == 'true'
        run: |
          cargo install --git https://github.com/coral-xyz/anchor avm --locked --force
          avm install 1.0.2 && avm use 1.0.2
      - name: Install surfpool 1.3.1
        if: steps.gate.outputs.run == 'true'
        run: cargo install surfpool --version 1.3.1 --locked
      - name: Install deps
        if: steps.gate.outputs.run == 'true'
        run: npm ci || npm install
      - name: Restore program keypairs + a CI wallet + .env
        if: steps.gate.outputs.run == 'true'
        run: |
          echo "$PROGRAM_KEYS_B64" | base64 -d | tar xz
          mkdir -p "$HOME/.config/solana"
          solana-keygen new --no-bip39-passphrase -o "$HOME/.config/solana/id.json" --force
          printf 'MAINNET_RPC_URL=%s\n' "$MAINNET_RPC_URL" > .env
      - name: Build all programs (edition-2024 pins applied in build.sh)
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/build.sh
      - name: Mainnet-fork conformance suite (59/59 expected)
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/fork-test.sh
      - name: SDK + dispatcher e2e (own surfnet, 5/5 expected)
        if: steps.gate.outputs.run == 'true'
        run: bash scripts/fork-test.sh tests/sdk/e2e.spec.ts
