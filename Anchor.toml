[toolchain]
anchor_version = "1.0.2"
solana_version = "3.1.10"
package_manager = "npm"

[features]
resolution = true
skip-lint = false

# Program IDs are added here as the registry / dispatcher / adapter programs are created (M1+).
[programs.localnet]

[provider]
cluster = "localnet"
wallet = "~/.config/solana/id.json"

[scripts]
test = "npx ts-mocha -p ./tsconfig.json -t 1000000 tests/**/*.spec.ts"

[hooks]
